services:
  youtube-download-service:
    build: ./youtube_download_service
    container_name: youtube-download-service
    ports:
      - "5002:5002"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
